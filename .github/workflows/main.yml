name: Controllo Quotidiano Concorsi
on:
  schedule:
    - cron: '0 8 * * *' # Gira ogni giorno alle 08:00
  workflow_dispatch: # Ti permette di farlo partire anche a mano per provare

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Installa i permessi
        run: pip install request
        - name: Avvia lo script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py
