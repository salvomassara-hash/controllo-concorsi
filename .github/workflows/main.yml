name: Controllo Concorsi Playwright

on:
  schedule:
    - cron: '0 7 * * *' # 8:00 ora italiana
  workflow_dispatch:      # Ti permette di cliccare "Run workflow" per testare

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: setup-python@v4
        with:
          python-version: '3.9'

      - name: Installa Playwright e dipendenze
        run: |
          pip install playwright requests
          # Questo comando installa il browser E le librerie di sistema necessarie
          playwright install chromium --with-deps 

      - name: Esegui lo script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python script.py
